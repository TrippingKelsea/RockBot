name: Release

on:
  push:
    tags:
      - "release"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate: only release from main
  check-branch:
    name: Verify main branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure tag is on main
        run: |
          if ! git branch -r --contains ${{ github.sha }} | grep -q 'origin/main'; then
            echo "::error::Release tags must be on the main branch"
            exit 1
          fi

  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip v prefix and -release suffix
          VERSION="${TAG#v}"
          VERSION="${VERSION%-release}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build-release:
    name: Build (${{ matrix.target }})
    needs: [check-branch, resolve-version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          ARTIFACT="rockbot-v${VERSION}-${{ matrix.target }}.tar.gz"

          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARTIFACT}" rockbot
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release/rockbot-v${{ needs.resolve-version.outputs.version }}-${{ matrix.target }}
          path: rockbot-v${{ needs.resolve-version.outputs.version }}-${{ matrix.target }}.tar.gz

  create-release:
    name: Create Release
    needs: [build-release, resolve-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release/*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: RockBot v${{ needs.resolve-version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
